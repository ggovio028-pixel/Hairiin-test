<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Хайрын Тест 💕</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { min-height:100vh; background:#0d0d1a; font-family:'Lato',sans-serif; color:#fff; display:flex; align-items:center; justify-content:center; overflow-x:hidden; }
  .stars { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
  .star { position:absolute; background:#fff; border-radius:50%; animation:twinkle 3s infinite alternate; }
  @keyframes twinkle { 0%{opacity:.2;transform:scale(1)} 100%{opacity:1;transform:scale(1.3)} }
  .container { position:relative; z-index:1; max-width:540px; width:90%; margin:40px auto; }
  .card { background:rgba(255,255,255,0.05); border:1px solid rgba(255,182,193,0.2); border-radius:24px; padding:40px 36px; backdrop-filter:blur(12px); box-shadow:0 0 60px rgba(255,100,150,0.1); }
  .screen { display:none; }
  .screen.active { display:block; }
  .btn { display:block; width:100%; padding:15px; border-radius:50px; border:none; cursor:pointer; font-size:1rem; font-family:'Lato',sans-serif; transition:all .3s ease; letter-spacing:.5px; margin-top:12px; }
  .btn-primary { background:linear-gradient(135deg,#ff6b9d,#c44dbb); color:#fff; box-shadow:0 4px 20px rgba(255,100,150,.4); }
  .btn-primary:hover { transform:translateY(-2px); }
  .progress-bar-wrap { background:rgba(255,255,255,.1); border-radius:10px; height:5px; margin-bottom:32px; overflow:hidden; }
  .progress-bar { height:100%; background:linear-gradient(90deg,#ff6b9d,#c44dbb); border-radius:10px; transition:width .5s ease; }
  .q-number { font-size:.75rem; letter-spacing:2px; text-transform:uppercase; color:#ff8fa3; margin-bottom:10px; }
  .q-text { font-family:'Playfair Display',serif; font-size:1.35rem; line-height:1.5; color:#fff; margin-bottom:20px; }
  .options { display:flex; flex-direction:column; gap:10px; margin-bottom:12px; }
  .option { background:rgba(255,255,255,.06); border:1px solid rgba(255,182,193,.15); border-radius:14px; padding:13px 18px; cursor:pointer; font-size:.95rem; color:rgba(255,255,255,.85); text-align:left; transition:all .25s ease; font-family:'Lato',sans-serif; }
  .option:hover { background:rgba(255,107,157,.2); border-color:#ff6b9d; color:#fff; transform:translateX(4px); }
  .option.chosen { background:rgba(255,107,157,.3); border-color:#ff6b9d; color:#fff; pointer-events:none; }
  .other-input { width:100%; background:rgba(255,255,255,.07); border:1px solid rgba(255,182,193,.2); border-radius:14px; padding:13px 18px; color:#fff; font-size:.95rem; font-family:'Lato',sans-serif; outline:none; transition:.2s; }
  .other-input:focus { border-color:#ff6b9d; background:rgba(255,107,157,.1); }
  .other-input::placeholder { color:rgba(255,255,255,.3); }
  .other-btn { margin-top:8px; background:rgba(255,107,157,.15); border:1px solid rgba(255,107,157,.3); border-radius:50px; padding:11px; color:#ffb6c1; font-size:.9rem; cursor:pointer; width:100%; font-family:'Lato',sans-serif; transition:.2s; }
  .other-btn:hover { background:rgba(255,107,157,.3); }
  .result-emoji { font-size:4rem; text-align:center; display:block; margin-bottom:16px; }
  .result-title { font-family:'Playfair Display',serif; font-size:1.6rem; color:#ffb6c1; text-align:center; margin-bottom:12px; }
  .result-desc { font-size:.95rem; color:rgba(255,255,255,.65); line-height:1.8; text-align:center; margin-bottom:24px; }
  .sent-note { font-size:.82rem; color:rgba(255,182,193,.6); text-align:center; margin-top:16px; }
  .love-end { text-align:center; margin-top:28px; font-family:'Playfair Display',serif; font-size:1.4rem; color:#ffb6c1; line-height:1.8; }
  .floating-hearts { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
  .fheart { position:absolute; bottom:-50px; animation:floatUp 4s ease-in forwards; }
  @keyframes floatUp { 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(-100vh);opacity:0} }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="floating-hearts" id="floatingHearts"></div>
<div class="container"><div class="card">

  <div class="screen active" id="introScreen">
    <div style="text-align:center;font-size:3.5rem;margin-bottom:20px;animation:pulse 1.5s infinite">💕</div>
    <div style="font-family:'Playfair Display',serif;font-size:2rem;color:#ffb6c1;margin-bottom:12px">
      Хайрт минь,<br><em style="color:#ff8fa3">өөрийнхөө тухай хэлнэ үү!</em>
    </div>
    <p style="font-size:.95rem;color:rgba(255,255,255,.6);line-height:1.7;margin-bottom:28px">
      Чиний тухай хэдэн асуулт байна. Үнэнчээр хариулаарай! 🌸
    </p>
    <button class="btn btn-primary" onclick="startQuiz()">Эхлэх ✨</button>
  </div>

  <div class="screen" id="quizScreen">
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    <div class="q-number" id="qNumber"></div>
    <div class="q-text" id="qText"></div>
    <div class="options" id="options"></div>
    <div>
      <input class="other-input" id="otherInput" placeholder="Өөр хариулт бичих... ✍️" />
      <button class="other-btn" onclick="submitOther()">Энэ хариултаа илгээх →</button>
    </div>
  </div>

  <div class="screen" id="resultScreen">
    <span class="result-emoji">🥰</span>
    <div class="result-title">Баярлалаа!</div>
    <div class="result-desc">Чамайг илүү мэдэх болсондоо баяртай байна... 💕</div>
    <div class="sent-note">📩 Хариултууд илгээгдлээ</div>
    <div class="love-end">
      Хайрт babe 🌸🙆🏻‍♂️🥰
      <span style="font-size:2.5rem;display:block;margin-top:12px;animation:pulse 1.5s infinite">💕🌸💕</span>
    </div>
  </div>

</div></div>

<script>
emailjs.init("J-82idDJL0kv5JvmG");
const SERVICE_ID = "service_pwr8eal";
const TEMPLATE_ID = "template_nq2q5jh";
const MY_EMAIL = "ggovio028@gmail.com";

const questions = [
  { q: "Чиний биеийн өндөр хэд вэ?", options: ["150-155 см", "155-160 см", "160-165 см", "165-170 см"] },
  { q: "Чиний хамгийн дуртай хоол юу вэ?", options: ["Бууз 🥟", "Хуурга 🍳", "Суши 🍣", "Бургер 🍔"] },
  { q: "Чиний дуртай өнгө юу вэ?", options: ["Ягаан 🩷", "Цэнхэр 💙", "Хар 🖤", "Цагаан 🤍"] },
  { q: "Чиний төрсөн сар хэдэн сар вэ?", options: ["1-3 сар 🌸", "4-6 сар ☀️", "7-9 сар 🍂", "10-12 сар ❄️"] },
  { q: "Чиний хамгийн том мөрөөдөл юу вэ?", options: ["Гадаадад аялах ✈️", "Гэр бүл болох 👨‍👩‍👧", "Амжилттай ажилтай болох 💼", "Аз жаргалтай байх 😊"] },
  { q: "Ямар дуу сонсохоо дуртай вэ?", options: ["Хайрын дуу 🎵", "Хип хоп 🎤", "Поп 🎧", "Тайван хөгжим 🎹"] },
  { q: "Хамгийн их юунаас айдаг вэ?", options: ["Ганцаардал 😔", "Ирээдүй 😰", "Хайртай хүнээ алдах 💔", "Амьтнаас 🐛"] },
  { q: "Чи ямар хүн вэ?", options: ["Тайван, нам гүм 🌸", "Хөгжилтэй, дуртай 😄", "Ухаалаг, бодолтой 🧠", "Халамжтай, зөөлөн 💕"] },
  { q: "Хайрт хүнтэйгээ юу хийхийг дуртай вэ?", options: ["Кино үзэх 🎬", "Хамт хоол идэх 🍽️", "Аялах 🌍", "Гэртээ хамт байх 🏠"] },
  { q: "Хэрэв нэг хүсэл биелүүлж чадвал юу хүсэх вэ?", options: ["Мөнгө 💰", "Хайр 💕", "Эрүүл мэнд 💪", "Аз жаргал 😊"] },
  { q: "Хайр гэдэг чинь чамд юу гэсэн үг вэ?", options: ["Найдвар дэмжлэг 🤝", "Баяр баясгалан 😊", "Халуун дотно мэдрэмж 🥰", "Хамт байх цаг 💑"] },
  { q: "Чиний хамгийн дуртай улирал юу вэ?", options: ["Хавар 🌸", "Зун ☀️", "Намар 🍂", "Өвөл ❄️"] },
  { q: "Өглөө босоод юу хийдэг вэ?", options: ["Утсаа харна 📱", "Шууд босно 🏃", "Удаан хэвтнэ 😴", "Хоол идэнэ 🍳"] }
];

let current = 0, answers = [], selecting = false;

for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.cssText = `width:${Math.random()*3+1}px;height:${Math.random()*3+1}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${Math.random()*3+2}s`;
  document.getElementById('stars').appendChild(s);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() {
  current = 0; answers = [];
  showScreen('quizScreen');
  showQuestion();
}

function showQuestion() {
  selecting = false;
  const q = questions[current];
  document.getElementById('qNumber').textContent = `Асуулт ${current+1} / ${questions.length}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('progressBar').style.width = ((current/questions.length)*100)+'%';
  document.getElementById('otherInput').value = '';
  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(opt, btn);
    opts.appendChild(btn);
  });
}

function selectAnswer(answer, btn) {
  if (selecting) return;
  selecting = true;
  document.querySelectorAll('.option').forEach(o => o.style.pointerEvents = 'none');
  btn.classList.add('chosen');
  spawnHearts();
  answers.push({ q: questions[current].q, answer });
  setTimeout(() => { current++; current < questions.length ? showQuestion() : showResult(); }, 700);
}

function submitOther() {
  if (selecting) return;
  const val = document.getElementById('otherInput').value.trim();
  if (!val) { document.getElementById('otherInput').focus(); return; }
  selecting = true;
  spawnHearts();
  answers.push({ q: questions[current].q, answer: val });
  setTimeout(() => { current++; current < questions.length ? showQuestion() : showResult(); }, 500);
}

async function showResult() {
  showScreen('resultScreen');
  for (let i = 0; i < 15; i++) setTimeout(() => spawnHearts(), i * 150);
  const answersText = answers.map((a, i) => `${i+1}. ${a.q}\n   → ${a.answer}`).join('\n\n');
  try {
    await emailjs.send(SERVICE_ID, TEMPLATE_ID, { to_email: MY_EMAIL, answers: answersText, score: "Хариултууд ирлээ 💕" });
  } catch(e) { console.error(e); }
}

function spawnHearts() {
  const h = document.createElement('div');
  h.className = 'fheart';
  h.textContent = ['💕','💖','💗','💓','🌸','✨'][Math.floor(Math.random()*6)];
  h.style.cssText = `left:${Math.random()*100}%;animation-duration:${Math.random()*2+3}s;font-size:${Math.random()*1.5+1}rem`;
  document.getElementById('floatingHearts').appendChild(h);
  setTimeout(() => h.remove(), 5000);
}
</script>
</body>
</html>
